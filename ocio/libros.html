<!--
  Contenido de la pestaña "Libros". Se inyecta dentro de
  <section id="panel-books"> (ver ocio/series.html para la explicación).
-->
<form id="form-search-books" class="search-slip" autocomplete="off">
  <div class="search-input-wrap">
    <input id="search-books-input" type="text" placeholder="Busca un libro o autor…" />
    <button type="button" class="search-clear-btn hidden" data-scope="books" aria-label="Borrar búsqueda">✕</button>
  </div>
  <button type="submit" class="btn btn--accent-books">Buscar</button>
</form>
<label class="lang-filter-check">
  <input type="checkbox" id="books-spanish-only" checked />
  Solo en español
</label>
<div id="search-books-results" class="results-strip"></div>
<div class="results-toolbar hidden" id="results-toolbar-books">
  <button type="button" class="btn btn--small btn--outline-dark" id="btn-load-more-books">Cargar más</button>
  <button type="button" class="btn-link" id="btn-hide-results-books">Ocultar resultados</button>
</div>
<button type="button" class="btn-link" id="btn-manual-book">¿No lo encuentras? Añadir manualmente</button>

<div class="library-head">
  <h2>Mi biblioteca</h2>
  <div class="library-controls">
    <div class="library-search">
      <span aria-hidden="true">🔍</span>
      <input type="search" class="library-search-input" data-scope="books" placeholder="Buscar en mi lista…" />
    </div>
    <div class="filter-chips" data-scope="books">
      <button class="chip is-active" data-status="todos">Todos</button>
      <button class="chip" data-status="pendiente">Pendiente</button>
      <button class="chip" data-status="en_curso">Leyendo</button>
      <button class="chip" data-status="completado">Leído</button>
      <button class="chip" data-status="standby">Standby</button>
      <button class="chip" data-status="abandonado">Abandonado</button>
    </div>
    <select class="sort-select" data-scope="books">
      <option value="añadido">Actividad reciente</option>
      <option value="fecha">Fecha de lectura</option>
      <option value="alfabetico">Alfabético</option>
      <option value="anio">Año de publicación</option>
    </select>
    <div class="view-toggle" data-scope="books">
      <button type="button" class="view-toggle__btn is-active" data-view="grid" aria-label="Vista en cuadrícula">▦</button>
      <button type="button" class="view-toggle__btn" data-view="list" aria-label="Vista en lista">☰</button>
    </div>
  </div>
</div>
<div id="library-books" class="library-grid"></div>
<p id="empty-books" class="empty-state hidden">
  Tu biblioteca está vacía. Busca un libro arriba y pulsa «Añadir».
</p>
